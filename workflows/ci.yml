name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code check
        uses: actions/checkout@v3

      - name: Set up Java (version used in the app is 11)
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build backend with maven
        run: mvn clean package
        working-directory: ./springboot/app

      - name: Login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./angular-app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-frontend:latest
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./springboot/app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-backend:latest

      - name: Prepare local images for compose Test
        run: |
          docker build -t spring-app ./springboot/app
          docker build -t angular-app ./angular-app

      - name: Test deployement
        run: docker compose up -d